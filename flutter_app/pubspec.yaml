name: teamsclone
description: Teams-like messaging app — mobile and desktop
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # State management
  provider: ^6.1.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  emoji_picker_flutter: ^2.1.1

  # File handling
  image_picker: ^1.2.2
  file_picker: ^8.0.0+1

  # Desktop window
  window_manager: ^0.3.8

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
